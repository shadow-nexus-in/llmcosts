name: GODMODE V8 — Daily Build Pipeline

on:
  schedule:
    - cron: "0 0 * * *"      # Every day at 00:00 UTC
  workflow_dispatch:          # Manual trigger from GitHub UI
  push:
    branches: [main]
    paths:
      - "models.json"         # Also trigger when models.json is manually updated

jobs:
  build:
    name: Build LLMCosts.dev
    runs-on: ubuntu-latest
    timeout-minutes: 300       # 5-hour hard ceiling (well within GitHub 6h limit)

    permissions:
      contents: write           # Allow committing dist/ back to repo
      pull-requests: write

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python Setup ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install Dependencies ──────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Inject Secrets as Environment Variables ───────────────────
      - name: Configure environment
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GITHUB_PAT: ${{ secrets.BOT_GITHUB_PAT }}
          GITHUB_BOT_USERNAME: ${{ secrets.GITHUB_BOT_USERNAME }}
          GOOGLE_INDEXING_API_KEY: ${{ secrets.GOOGLE_INDEXING_API_KEY }}
          SITE_URL: ${{ secrets.SITE_URL || 'https://llmcosts.dev' }}
        run: echo "Environment configured"

      # ── 5. Run the Full Build Pipeline ───────────────────────────────
      - name: Run build pipeline
        env:
          GROQ_API_KEY_1: ${{ secrets.GROQ_API_KEY_1 }}
          GROQ_API_KEY_2: ${{ secrets.GROQ_API_KEY_2 }}
          GROQ_API_KEY_3: ${{ secrets.GROQ_API_KEY_3 }}
          GROQ_API_KEY_4: ${{ secrets.GROQ_API_KEY_4 }}
          GITHUB_PAT: ${{ secrets.BOT_GITHUB_PAT }}
          GITHUB_BOT_USERNAME: ${{ secrets.GITHUB_BOT_USERNAME }}
          GOOGLE_INDEXING_API_KEY: ${{ secrets.GOOGLE_INDEXING_API_KEY }}
          SITE_URL: "https://llmcosts.dev"
        run: python build.py

      # ── 6. Commit & Push Changes ─────────────────────────────────────
      - name: Commit and push updated site
        run: |
          git config user.name "LLMCosts Bot"
          git config user.email "bot@llmcosts.dev"
          git add dist/ data/ logs/build_report.json || true
          git add dist/_redirects dist/_headers dist/index.html dist/compare/ dist/daily-report/ || true
          git diff --cached --quiet || git commit -m "chore: daily build $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push origin main
        continue-on-error: true     # Don't fail the workflow if nothing changed

      # ── 7. Deploy to Cloudflare Pages ────────────────────────────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: llmcosts
          directory: dist
          branch: main

      # ── 8. Upload Build Log as Artifact ──────────────────────────────
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ github.run_number }}
          path: logs/
          retention-days: 14
